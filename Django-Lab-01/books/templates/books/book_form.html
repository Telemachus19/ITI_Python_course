<!DOCTYPE html>
<html>
<head>
    <title>Bookstore - {{ action }} Book</title>
</head>
<body>
    <h1>{{ action }} Book</h1>
    <form method="post">
        {% csrf_token %}
        <table>
            {{ form.as_table }}
        </table>
        <br>
        <button type="submit">Save</button>
        <a href="{% if book %}{% url 'book_detail' book.pk %}{% else %}{% url 'book_list' %}{% endif %}">Cancel</a>
    </form>
</body>
</html>
