{% extends 'books/base.html' %}

{% block title %}Signup{% endblock %}

{% block content %}
<h1>Signup</h1>

<form method="post">
    {% csrf_token %}
    <table>
        {{ form.as_table }}
    </table>
    <br>
    <button type="submit">Signup</button>
</form>

<p>Already have an account? <a href="{% url 'login' %}">Login here</a>.</p>
{% endblock %}
