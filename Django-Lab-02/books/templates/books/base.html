{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bookstore{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'books/style.css' %}">
</head>
<body>
    <header>
        <a href="{% url 'book_list' %}" class="logo">Bookstore</a>
        <div class="nav-links">
            <a href="{% url 'book_list' %}">All Books</a>
            {% if user.is_authenticated %}
                <a href="{% url 'book_create' %}">Add a Book</a>
                <span style="margin-right: 15px;">Logged in as: <strong>{{ user.username }}</strong></span>
                <form action="{% url 'logout' %}" method="post" style="display: inline; margin-right: 15px;">
                    {% csrf_token %}
                    <button type="submit" style="background: none; border: none; color: #0000ee; text-decoration: underline; cursor: pointer; padding: 0; font-family: inherit; font-size: inherit;">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'signup' %}">Signup</a>
            {% endif %}
        </div>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
